name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install quality tools
        run: python -m pip install --disable-pip-version-check -r requirements.txt -r requirements-dev.txt

      - name: Validate package and configuration
        run: |
          python -m compileall -q crypto_alerts crypto_alerts_updated.py tests
          python -m crypto_alerts validate-config --config config.example.json
          python -m build
          python -m venv /tmp/crypto-alerts-wheel
          /tmp/crypto-alerts-wheel/bin/python -m pip install --disable-pip-version-check dist/*.whl
          (cd /tmp && /tmp/crypto-alerts-wheel/bin/crypto-alerts --help)

      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v

      - name: Lint
        run: python -m ruff check crypto_alerts tests crypto_alerts_updated.py

      - name: Static security scan
        run: python -m bandit -q -r crypto_alerts

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt
